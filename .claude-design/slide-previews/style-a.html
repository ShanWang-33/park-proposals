<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style A: Bold Signal</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #1a1a1a; }
  .slide {
    width: 100vw; height: 100vh; height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
  }
  .nav { position: absolute; top: clamp(1rem, 3vh, 2rem); right: clamp(1.5rem, 4vw, 3rem); display: flex; gap: clamp(0.8rem, 1.5vw, 1.5rem); z-index: 10; }
  .nav span { font-family: 'Space Grotesk', sans-serif; font-size: clamp(0.6rem, 1vw, 0.8rem); color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: color 0.3s; }
  .nav span.active { color: #fff; }
  .num { position: absolute; top: clamp(1rem, 3vh, 2rem); left: clamp(1.5rem, 4vw, 3rem); font-family: 'Archivo Black', sans-serif; font-size: clamp(3rem, 8vw, 8rem); color: rgba(255,255,255,0.04); line-height: 1; z-index: 1; }
  .card {
    width: clamp(280px, 50vw, 600px); padding: clamp(2rem, 5vw, 4rem);
    background: #FF5722; border-radius: clamp(12px, 2vw, 24px);
    position: relative; z-index: 5;
    animation: cardSlide 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes cardSlide { from { opacity: 0; transform: translateY(40px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .card h1 { font-family: 'Archivo Black', sans-serif; font-size: clamp(1.5rem, 4vw, 3rem); color: #1a1a1a; line-height: 1.1; margin-bottom: clamp(0.5rem, 1.5vh, 1rem); }
  .card p { font-family: 'Space Grotesk', sans-serif; font-size: clamp(0.7rem, 1.2vw, 1rem); color: rgba(26,26,26,0.7); line-height: 1.6; }
  .tag { display: inline-block; margin-top: clamp(0.8rem, 2vh, 1.5rem); padding: clamp(0.3rem, 0.5vh, 0.5rem) clamp(0.8rem, 1.5vw, 1.2rem); border: 1.5px solid rgba(26,26,26,0.3); border-radius: 100px; font-family: 'Space Grotesk', sans-serif; font-size: clamp(0.55rem, 0.9vw, 0.75rem); color: #1a1a1a; letter-spacing: 1px; text-transform: uppercase; }
  .side-text { position: absolute; bottom: clamp(1.5rem, 4vh, 3rem); left: clamp(1.5rem, 4vw, 3rem); z-index: 5; }
  .side-text h2 { font-family: 'Archivo Black', sans-serif; font-size: clamp(0.8rem, 1.5vw, 1.2rem); color: rgba(255,255,255,0.15); text-transform: uppercase; letter-spacing: 3px; }
  .glow { position: absolute; width: clamp(200px, 40vw, 500px); height: clamp(200px, 40vw, 500px); border-radius: 50%; filter: blur(100px); opacity: 0.15; }
  .glow-1 { background: #FF5722; top: -10%; right: -5%; }
  .glow-2 { background: #FF9800; bottom: -15%; left: -10%; }
  .label { position: absolute; top: clamp(1rem, 3vh, 2rem); left: 50%; transform: translateX(-50%); font-family: 'Space Grotesk', sans-serif; font-size: clamp(0.5rem, 0.8vw, 0.65rem); color: rgba(255,255,255,0.2); letter-spacing: 4px; text-transform: uppercase; z-index: 10; }
</style>
</head>
<body>
<div class="slide">
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="label">Style A · Bold Signal</div>
  <div class="num">01</div>
  <div class="nav">
    <span class="active">Cover</span>
    <span>McDull</span>
    <span>Nature</span>
    <span>Opening</span>
  </div>
  <div class="card">
    <h1>深圳市儿童公园<br>IP联动方案</h1>
    <p>深港&国际IP内容驱动儿童公园新生态<br>打造新一代城市儿童文化空间</p>
    <span class="tag">Pitch Deck 2026</span>
  </div>
  <div class="side-text">
    <h2>Shenzhen Children's Park</h2>
  </div>
</div>
</body>
</html>

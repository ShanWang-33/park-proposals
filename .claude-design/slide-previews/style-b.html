<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style B: Creative Voltage</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  .slide {
    width: 100vw; height: 100vh; height: 100dvh;
    display: flex; position: relative; overflow: hidden;
  }
  .left { flex: 1; background: #0066ff; display: flex; flex-direction: column; justify-content: flex-end; padding: clamp(2rem, 5vw, 4rem); position: relative; }
  .left::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 70%, rgba(212,255,0,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0,0,0,0.2) 0%, transparent 40%);
  }
  .right { flex: 1; background: #1a1a2e; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: clamp(2rem, 5vw, 4rem); position: relative; }
  .right::before {
    content: ''; position: absolute; inset: 0; opacity: 0.03;
    background-image: radial-gradient(circle, #fff 1px, transparent 1px);
    background-size: 20px 20px;
  }
  .badge {
    position: absolute; top: clamp(1rem, 3vh, 2rem); left: clamp(1.5rem, 3vw, 2.5rem);
    background: #d4ff00; color: #0066ff; font-family: 'Space Mono', monospace;
    font-size: clamp(0.5rem, 0.8vw, 0.65rem); font-weight: 700;
    padding: clamp(0.3rem, 0.5vh, 0.5rem) clamp(0.6rem, 1vw, 1rem);
    border-radius: 4px; text-transform: uppercase; letter-spacing: 2px; z-index: 10;
    animation: flash 2s ease-in-out infinite;
  }
  @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
  .left h1 {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: clamp(2rem, 6vw, 4.5rem); color: #fff; line-height: 1;
    position: relative; z-index: 5;
    animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  .neon-line { width: clamp(60px, 8vw, 100px); height: 4px; background: #d4ff00; margin: clamp(0.8rem, 2vh, 1.5rem) 0; position: relative; z-index: 5; border-radius: 2px; box-shadow: 0 0 10px rgba(212,255,0,0.5); }
  .left p { font-family: 'Space Mono', monospace; font-size: clamp(0.6rem, 1vw, 0.85rem); color: rgba(255,255,255,0.6); line-height: 1.8; position: relative; z-index: 5; animation: slideUp 0.7s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both; }
  .stats { display: flex; flex-direction: column; gap: clamp(1rem, 3vh, 2rem); position: relative; z-index: 5; }
  .stat { text-align: center; animation: fadeIn 0.6s ease both; }
  .stat:nth-child(1) { animation-delay: 0.3s; }
  .stat:nth-child(2) { animation-delay: 0.5s; }
  .stat:nth-child(3) { animation-delay: 0.7s; }
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
  .stat-num { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(2rem, 5vw, 3.5rem); color: #d4ff00; line-height: 1; }
  .stat-label { font-family: 'Space Mono', monospace; font-size: clamp(0.5rem, 0.8vw, 0.7rem); color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 2px; margin-top: clamp(0.2rem, 0.5vh, 0.4rem); }
  .corner-text { position: absolute; bottom: clamp(1rem, 2vh, 1.5rem); right: clamp(1rem, 2vw, 1.5rem); font-family: 'Space Mono', monospace; font-size: clamp(0.45rem, 0.7vw, 0.6rem); color: rgba(255,255,255,0.15); letter-spacing: 3px; text-transform: uppercase; writing-mode: vertical-rl; }
  .label { position: absolute; top: clamp(1rem, 3vh, 2rem); left: 50%; transform: translateX(-50%); font-family: 'Space Mono', monospace; font-size: clamp(0.5rem, 0.8vw, 0.65rem); color: rgba(255,255,255,0.25); letter-spacing: 4px; text-transform: uppercase; z-index: 20; }
  @media (max-width: 700px) {
    .slide { flex-direction: column; }
    .left, .right { flex: none; height: 50%; }
  }
</style>
</head>
<body>
<div class="slide">
  <div class="label">Style B · Creative Voltage</div>
  <div class="left">
    <div class="badge">2026 Pitch</div>
    <h1>深圳市<br>儿童公园</h1>
    <div class="neon-line"></div>
    <p>深港&国际IP联动方案<br>打造城市儿童文化新地标</p>
  </div>
  <div class="right">
    <div class="stats">
      <div class="stat">
        <div class="stat-num">2</div>
        <div class="stat-label">Core IPs</div>
      </div>
      <div class="stat">
        <div class="stat-num">6.1</div>
        <div class="stat-label">Opening Day</div>
      </div>
      <div class="stat">
        <div class="stat-num">120</div>
        <div class="stat-label">Plant Species</div>
      </div>
    </div>
    <div class="corner-text">Shenzhen Children's Park</div>
  </div>
</div>
</body>
</html>

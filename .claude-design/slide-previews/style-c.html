<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style C: Dark Botanical</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,600;0,700;1,400;1,600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #0f0f0f; }
  .slide {
    width: 100vw; height: 100vh; height: 100dvh;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    position: relative; overflow: hidden; background: #0f0f0f;
  }
  /* Soft botanical-inspired gradient orbs */
  .orb {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.25;
    animation: drift 8s ease-in-out infinite alternate;
  }
  .orb-1 { width: clamp(200px, 35vw, 450px); height: clamp(200px, 35vw, 450px); background: linear-gradient(135deg, #d4a574, #e8b4b8); top: -10%; right: -5%; }
  .orb-2 { width: clamp(150px, 25vw, 350px); height: clamp(150px, 25vw, 350px); background: linear-gradient(135deg, #c9b896, #8b9a6b); bottom: -5%; left: -5%; animation-delay: -4s; }
  .orb-3 { width: clamp(100px, 18vw, 250px); height: clamp(100px, 18vw, 250px); background: linear-gradient(135deg, #e8b4b8, #c9b896); top: 40%; left: 30%; opacity: 0.1; animation-delay: -2s; }
  @keyframes drift { 0% { transform: translate(0, 0); } 100% { transform: translate(20px, -15px); } }
  .content { position: relative; z-index: 5; text-align: center; max-width: min(85vw, 700px); }
  .accent-line { width: 1px; height: clamp(40px, 8vh, 80px); background: linear-gradient(to bottom, transparent, #d4a574, transparent); margin: 0 auto clamp(1rem, 3vh, 2rem); animation: fadeDown 1s 0.2s ease both; }
  @keyframes fadeDown { from { opacity: 0; transform: scaleY(0); } to { opacity: 1; transform: scaleY(1); } }
  .kicker { font-family: 'IBM Plex Sans', sans-serif; font-weight: 300; font-size: clamp(0.55rem, 0.9vw, 0.75rem); color: #d4a574; letter-spacing: 4px; text-transform: uppercase; margin-bottom: clamp(0.8rem, 2vh, 1.5rem); animation: fadeUp 0.8s 0.4s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
  h1 { font-family: 'Cormorant', serif; font-weight: 600; font-size: clamp(2.5rem, 7vw, 5rem); color: #e8e4df; line-height: 1.1; margin-bottom: clamp(0.5rem, 1.5vh, 1rem); animation: fadeUp 0.8s 0.6s ease both; }
  h1 em { font-style: italic; color: #e8b4b8; }
  .sub { font-family: 'IBM Plex Sans', sans-serif; font-weight: 300; font-size: clamp(0.7rem, 1.2vw, 1rem); color: #9a9590; line-height: 1.8; max-width: 500px; margin: 0 auto; animation: fadeUp 0.8s 0.8s ease both; }
  .tags { display: flex; gap: clamp(0.5rem, 1vw, 1rem); justify-content: center; flex-wrap: wrap; margin-top: clamp(1.5rem, 4vh, 2.5rem); animation: fadeUp 0.8s 1s ease both; }
  .tags span { font-family: 'IBM Plex Sans', sans-serif; font-weight: 400; font-size: clamp(0.5rem, 0.8vw, 0.7rem); color: #9a9590; border: 1px solid rgba(154,149,144,0.25); padding: clamp(0.3rem, 0.5vh, 0.5rem) clamp(0.8rem, 1.2vw, 1.2rem); border-radius: 100px; letter-spacing: 1px; }
  .bottom-line { position: absolute; bottom: clamp(2rem, 5vh, 3.5rem); left: 50%; transform: translateX(-50%); font-family: 'Cormorant', serif; font-style: italic; font-size: clamp(0.6rem, 0.9vw, 0.8rem); color: rgba(154,149,144,0.3); letter-spacing: 2px; z-index: 5; }
  .label { position: absolute; top: clamp(1rem, 3vh, 2rem); left: 50%; transform: translateX(-50%); font-family: 'IBM Plex Sans', sans-serif; font-size: clamp(0.5rem, 0.8vw, 0.65rem); color: rgba(154,149,144,0.3); letter-spacing: 4px; text-transform: uppercase; z-index: 10; }
</style>
</head>
<body>
<div class="slide">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="label">Style C · Dark Botanical</div>
  <div class="content">
    <div class="accent-line"></div>
    <div class="kicker">Shenzhen Children's Park</div>
    <h1>深圳市儿童公园<br><em>IP联动方案</em></h1>
    <p class="sub">深港&国际IP内容驱动儿童公园新生态<br>打造新一代城市儿童文化空间和IP体验目的地</p>
    <div class="tags">
      <span>麦兜 IP</span>
      <span>自然三部曲</span>
      <span>深港文化共融</span>
    </div>
  </div>
  <div class="bottom-line">— 2026 —</div>
</div>
</body>
</html>
